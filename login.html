<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول · صندوق التكافل العائلي</title>
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--gray-100);padding:1rem;}
    .login-wrapper{width:100%;max-width:26.25rem;padding:0 0.5rem;}
    .login-card{background:#fff;border:0.0625rem solid var(--gray-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden;}
    .login-header{background:var(--primary);padding:1.75rem 1.5rem;text-align:center;color:#fff;position:relative;overflow:hidden;}
    .login-header::before{content:'';position:absolute;top:-3.125rem;right:-3.125rem;width:10rem;height:10rem;border-radius:50%;background:rgba(255,255,255,.05);}
    .login-header .logo-wrap{width:4.25rem;height:4.25rem;background:rgba(255,255,255,.15);border:0.125rem solid rgba(255,255,255,.25);border-radius:1.125rem;display:flex;align-items:center;justify-content:center;font-size:1.875rem;margin:0 auto 0.75rem;}
    .login-header h1{font-size:1.125rem;font-weight:700;margin:0 0 0.3125rem;}
    .login-header p{font-size:0.75rem;opacity:.8;margin:0;}
    .demo-btns{display:flex;gap:0.5rem;justify-content:center;margin-top:0.875rem;}
    .demo-btn{padding:0.25rem 0.875rem;border-radius:0.875rem;font-size:0.6875rem;font-weight:500;border:0.0625rem solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;font-family:var(--font);transition:background .15s;min-height:1.75rem;}
    .demo-btn:hover{background:rgba(255,255,255,.25);}
    .login-body{padding:1.5rem;}
    .field-wrap{position:relative;}
    .field-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);font-size:0.9375rem;pointer-events:none;opacity:.5;}
    .toggle-pass{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);font-size:0.9375rem;cursor:pointer;opacity:.5;transition:opacity .15s;background:none;border:none;padding:0.5rem;}
    .toggle-pass:hover{opacity:1;}
    .remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;font-size:0.8125rem;flex-wrap:wrap;gap:0.5rem;}
    .remember-row label{display:flex;align-items:center;gap:0.375rem;cursor:pointer;color:var(--gray-600);}
    .remember-row input[type=checkbox]{accent-color:var(--primary);width:1rem;height:1rem;}
    .forgot-link{color:var(--info);text-decoration:none;font-size:0.8125rem;}
    .forgot-link:hover{text-decoration:underline;}
    .btn-login{width:100%;padding:0.75rem;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-md);font-size:1rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .15s,transform .1s;min-height:var(--touch-min);}
    .btn-login:hover{background:var(--primary-hover);}
    .btn-login:active{transform:scale(.98);}
    .btn-login:disabled{background:var(--gray-400);cursor:not-allowed;}
    .error-alert{background:var(--danger-light);border:0.0625rem solid var(--danger-border);border-radius:var(--radius-md);color:var(--danger-dark);padding:0.6875rem 0.875rem;font-size:0.8125rem;margin-bottom:1rem;display:none;align-items:center;gap:0.5rem;}
    .error-alert.show{display:flex;}
    @media(min-width:48rem){.login-header{padding:2.25rem 2rem;}.login-body{padding:2rem;}.login-header h1{font-size:1.25rem;}}
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-wrap">🤝</div>
      <h1>صندوق التكافل العائلي</h1>
      <p>نظام إدارة المساعدات والاشتراكات</p>
      <div class="demo-btns">
        <button class="demo-btn" onclick="fillDemo('admin')">تجربة كأدمن</button>
        <button class="demo-btn" onclick="fillDemo('member')">تجربة كعضو</button>
      </div>
    </div>
    <div class="login-body">
      <div class="error-alert" id="errorAlert"><span>✗</span><span id="errorMsg">البريد أو كلمة المرور غير صحيحة</span></div>
      <div class="form-group"><label class="form-label" for="emailInput">البريد الإلكتروني <span class="req">*</span></label><div class="field-wrap"><span class="field-icon">✉</span><input type="email" id="emailInput" class="form-control-custom" placeholder="example@family-fund.jo" autocomplete="email"></div></div>
      <div class="form-group"><label class="form-label" for="passInput">كلمة المرور <span class="req">*</span></label><div class="field-wrap"><span class="field-icon">🔒</span><input type="password" id="passInput" class="form-control-custom" placeholder="أدخل كلمة المرور" autocomplete="current-password"><button class="toggle-pass" type="button" onclick="togglePassword()" id="toggleBtn" aria-label="إظهار كلمة المرور">👁</button></div></div>
      <div class="remember-row"><label><input type="checkbox" id="rememberMe"> تذكرني لمدة 30 يوماً</label><a href="forgot-password.html" class="forgot-link">نسيت كلمة المرور؟</a></div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
    </div>
  </div>
</div>
<script src="assets/shared.js"></script>
<script>
if(Auth.isLoggedIn()){window.location.href=Auth.isAdmin()?'admin-dashboard.html':'member-dashboard.html';}
function fillDemo(r){document.getElementById('errorAlert').classList.remove('show');if(r==='admin'){document.getElementById('emailInput').value='admin@family-fund.jo';document.getElementById('passInput').value='Admin@2024!';}else{document.getElementById('emailInput').value='ahmed@family-fund.jo';document.getElementById('passInput').value='Member@2024!';}}
function togglePassword(){const i=document.getElementById('passInput'),b=document.getElementById('toggleBtn');if(i.type==='password'){i.type='text';b.textContent='🙈';}else{i.type='password';b.textContent='👁';}}
async function doLogin(){const email=document.getElementById('emailInput').value.trim(),password=document.getElementById('passInput').value,btn=document.getElementById('loginBtn'),err=document.getElementById('errorAlert'),errMsg=document.getElementById('errorMsg');err.classList.remove('show');if(!email){errMsg.textContent='يرجى إدخال البريد';err.classList.add('show');return;}if(!password){errMsg.textContent='يرجى إدخال كلمة المرور';err.classList.add('show');return;}UI.btnLoading(btn,true);try{await new Promise(r=>setTimeout(r,900));if(email.includes('admin')){Auth.save('demo-jwt-admin-token',{id:1,fullName:'عبدالله المدير',email,role:'Admin',familyId:'FAM-001'});window.location.href='admin-dashboard.html';}else{Auth.save('demo-jwt-member-token',{id:4,fullName:'أحمد محمد',email,role:'Member',familyId:'FAM-001'});window.location.href='member-dashboard.html';}}catch(e){errMsg.textContent=e.message||'حدث خطأ';err.classList.add('show');UI.btnLoading(btn,false,'تسجيل الدخول');}}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
