<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق التكافل العائلي</title>
    <meta http-equiv="refresh" content="0; url=login.html">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        body{font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f1f3f5;padding:1.5rem;direction:rtl;}
        .wrapper{text-align:center;}
        .spinner{width:40px;height:40px;border:3px solid #e9ecef;border-top-color:#1a3d5c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        p{font-size:14px;color:#6c757d;}
        a{color:#185FA5;text-decoration:none;font-weight:500;}
        a:hover{text-decoration:underline;}
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="spinner"></div>
        <p>جاري التحميل... <a href="login.html">انقر هنا</a></p>
    </div>
</body>
</html>
